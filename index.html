<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>教室時鐘</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+TC:wght@300;400&family=Zen+Antique+Soft&family=Caveat:wght@700&family=Fredoka:wght@600&family=Silkscreen:wght@700&family=Handjet:wght@700&family=Pixelify+Sans:wght@700&family=Press+Start+2P&family=Audiowide&family=Pacifico&family=ZCOOL+XiaoWei&family=Righteous&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/menu.css" />
</head>
<body>

<!-- Vibe background (iframe) -->
<iframe id="vibe-frame" src="" tabindex="-1"></iframe>

<!-- Vibe name hint -->
<div class="vibe-hint" id="vibeHint"></div>

<!-- Density hint -->
<div class="density-hint" id="densityHint"></div>

<!-- ══ Hamburger Button ══ -->
<button class="hamburger-btn" id="hamburgerBtn">
  <span></span><span></span><span></span>
</button>

<!-- ══ Menu Overlay ══ -->
<div class="menu-overlay" id="menuOverlay"></div>

<!-- ══ Side Menu Panel ══ -->
<div class="menu-panel" id="menuPanel">

  <!-- 1. Period Settings -->
  <div class="menu-section">
    <div class="menu-section-title">上下課時間設定</div>
    <div class="period-grid" id="periodGrid"></div>
  </div>

  <!-- 2. Schedule Management -->
  <div class="menu-section">
    <div class="menu-section-title">考程管理</div>
    <div class="schedule-list" id="scheduleList"></div>
    <button class="btn-new-schedule" id="btnNewSchedule">＋ 新增考程</button>
  </div>

  <!-- 3. Sound Settings -->
  <div class="menu-section">
    <div class="menu-section-title">音效設定</div>
    <div class="mute-row">
      <label>狀態轉換提示音</label>
      <label class="small-toggle">
        <input type="checkbox" id="muteToggle" />
        <div class="st-track"></div>
        <div class="st-thumb"></div>
      </label>
    </div>
  </div>

</div>

<!-- ══ Schedule Editor Modal ══ -->
<div class="editor-overlay" id="editorOverlay">
  <div class="editor-modal">
    <div class="editor-header">
      <span class="editor-title">考程編輯</span>
      <button class="editor-close" id="editorClose">✕</button>
    </div>

    <!-- Basic info -->
    <div class="editor-row">
      <div class="editor-field">
        <label>考程名稱</label>
        <input type="text" id="editorName" placeholder="例：第一次期中考" />
      </div>
      <div class="editor-field">
        <label>類型</label>
        <select id="editorType">
          <option value="monthly">月考</option>
          <option value="mock">模擬考</option>
        </select>
      </div>
      <div class="editor-field">
        <label>第一天日期</label>
        <input type="date" id="editorDate" />
      </div>
    </div>

    <!-- Day tabs -->
    <div class="day-tabs" id="dayTabs"></div>

    <!-- Drag palette -->
    <div class="drag-palette">
      <div class="drag-block" draggable="true" data-duration="50">50 分鐘</div>
      <div class="drag-block" draggable="true" data-duration="80">80 分鐘</div>
      <div class="drag-block" draggable="true" data-duration="100">100 分鐘</div>
      <div class="drag-block study" draggable="true" data-duration="50" data-study="true">自習</div>
    </div>

    <!-- Schedule grid -->
    <div class="schedule-grid" id="scheduleGrid"></div>

    <!-- Early submit settings -->
    <div id="earlySubmitSection">
      <div class="menu-section-title" style="margin-bottom:8px">提早交卷設定</div>
      <div class="early-submit-grid" id="earlySubmitGrid"></div>
    </div>

    <!-- Actions -->
    <div class="editor-actions">
      <button class="btn-cancel" id="btnCancelEditor">取消</button>
      <button class="btn-save" id="btnSaveEditor">儲存</button>
    </div>
  </div>
</div>

<!-- ══ Main Content ══ -->
<div class="container">

  <!-- Exam Selector Bar -->
  <div class="exam-selector" id="examSelector"></div>

  <div class="date-line" id="dateLine"></div>

  <div class="digital">
    <span class="d" id="h0">0</span><span class="d" id="h1">0</span>
    <span class="colon">:</span>
    <span class="d" id="m0">0</span><span class="d" id="m1">0</span>
    <span class="colon">:</span>
    <span class="d" id="s0">0</span><span class="d" id="s1">0</span>
  </div>

  <div class="weekday" id="weekday"></div>
  <div class="divider"></div>

  <!-- Status Bar -->
  <div class="status-bar" id="statusBar">
    <div class="status-text" id="statusText"></div>
    <div class="status-countdown" id="statusCountdown" style="display:none">
      <span class="scd" id="scd0">-</span><span class="scd" id="scd1">-</span>
      <span class="scd-colon">:</span>
      <span class="scd" id="scd2">-</span><span class="scd" id="scd3">-</span>
    </div>
    <div class="status-progress"><div class="status-progress-bar" id="statusProgressBar" style="width:100%"></div></div>
    <div class="status-info" id="statusInfo"></div>
  </div>

</div>

<script src="js/clock.js"></script>
<script src="js/exam-data.js"></script>
<script src="js/exam-engine.js"></script>
<script src="js/audio.js"></script>
<script src="js/exam-ui.js"></script>
<script src="js/menu.js"></script>
<script src="js/vibe-manager.js"></script>
<script>
  MenuModule.init();
  ExamUI.init();
  ClockModule.start();
</script>
</body>
</html>
