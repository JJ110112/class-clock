<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; }
  body { overflow:hidden; background: url('../img/coral reef.jpg') center/cover no-repeat; cursor:default; }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
/* ═══════════════════════════════
   珊瑚海洋 – Coral Reef & Nemo
   (photo background version)
   ═══════════════════════════════ */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
window.addEventListener('resize', () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; buildFish(); buildLightRays(); });

let mousePos = { x: -999, y: -999 };
let smoothWindX = 0, smoothWindY = 0;
const WIND_DECAY = 0.93, WIND_GAIN = 0.6;
const WIND_RADIUS = 200;
function windAt(x, y) { const dx=x-mousePos.x, dy=y-mousePos.y, d=Math.sqrt(dx*dx+dy*dy); return d<WIND_RADIUS?1-d/WIND_RADIUS:0; }

const DENSITIES = [
  { label: '寧靜珊瑚', fish: 6 },
  { label: '珊瑚花園', fish: 14 },
  { label: '產卵季節', fish: 25 },
];
let densityIdx = 1;

function rand(a, b) { return a + Math.random() * (b - a); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

window.addEventListener('message', (e) => {
  if (e.data.type === 'mousemove') {
    mousePos.x = e.data.x; mousePos.y = e.data.y;
    smoothWindX += e.data.windVX * e.data.windStrength * WIND_GAIN;
    smoothWindY += e.data.windVY * e.data.windStrength * WIND_GAIN;
  }
  if (e.data.type === 'density') {
    densityIdx = (densityIdx + e.data.dir + DENSITIES.length) % DENSITIES.length;
    buildFish();
    parent.postMessage({ type: 'densityLabel', label: DENSITIES[densityIdx].label }, '*');
  }
  if (e.data.type === 'click') handleClick(e.data.x, e.data.y);
});

// ── Coral click zones (left & right sides where corals are in the photo) ──
const coralZones = [
  { x: 0, y: H * 0.5, w: W * 0.3, h: H * 0.5 },          // left bottom
  { x: W * 0.7, y: H * 0.5, w: W * 0.3, h: H * 0.5 },    // right bottom
  { x: 0, y: H * 0.3, w: W * 0.15, h: H * 0.3 },          // left mid
  { x: W * 0.85, y: H * 0.3, w: W * 0.15, h: H * 0.3 },   // right mid
];

// ── Fish ──
const FISH_COLORS = [
  { body: '#44aaff', fin: '#2288dd' },
  { body: '#ffaa33', fin: '#dd8811' },
  { body: '#66ddaa', fin: '#44bb88' },
  { body: '#ff77aa', fin: '#dd5588' },
  { body: '#aabb44', fin: '#889922' },
];
let fishes = [];

function buildFish() {
  fishes = [];
  const count = DENSITIES[densityIdx].fish;
  for (let i = 0; i < count; i++) {
    const color = FISH_COLORS[Math.floor(rand(0, FISH_COLORS.length))];
    const dir = Math.random() > 0.5 ? 1 : -1;
    fishes.push({
      x: rand(0, W), y: rand(H * 0.08, H * 0.55),
      vx: dir * rand(0.3, 1.0), vy: rand(-0.1, 0.1),
      size: rand(6, 14), color, dir,
      tailPhase: rand(0, Math.PI * 2),
    });
  }
}

// ── Nemo ──
let nemos = [];

function spawnNemo(x, y) {
  const dir = Math.random() > 0.5 ? 1 : -1;
  nemos.push({
    x, y: y - 20,
    vx: dir * rand(0.8, 2.0), vy: rand(-1, -0.3),
    size: rand(10, 16), tailPhase: rand(0, Math.PI * 2),
    life: rand(6, 12), wiggle: 0,
  });
}

// ── Bubbles ──
let bubbles = [];

function emitBubble() {
  if (bubbles.length > 30) return;
  bubbles.push({
    x: rand(0, W), y: H + 5,
    vx: 0, vy: rand(-0.5, -1.5),
    size: rand(2, 6), alpha: rand(0.2, 0.5),
  });
}

// ── Light rays ──
let lightRays = [];

function buildLightRays() {
  lightRays = [];
  for (let i = 0; i < 6; i++) {
    lightRays.push({
      x: rand(W * 0.05, W * 0.95),
      width: rand(30, 80),
      alpha: rand(0.02, 0.05),
      speed: rand(0.1, 0.3),
      phase: rand(0, Math.PI * 2),
    });
  }
}

// ── Click handler ──
function handleClick(cx, cy) {
  // Spawn bubbles at click
  for (let i = 0; i < Math.floor(rand(5, 12)); i++) {
    bubbles.push({
      x: cx + rand(-15, 15), y: cy + rand(-10, 10),
      vx: rand(-0.3, 0.3), vy: rand(-1.5, -3),
      size: rand(2, 8), alpha: rand(0.4, 0.7),
    });
  }
  // Check if clicked on coral zone → spawn Nemo
  for (const z of coralZones) {
    if (cx >= z.x && cx <= z.x + z.w && cy >= z.y && cy <= z.y + z.h) {
      spawnNemo(cx, cy);
      break;
    }
  }
}

// ── Drawing ──
function drawFish(f) {
  ctx.save();
  ctx.translate(f.x, f.y);
  ctx.scale(f.dir, 1);
  const s = f.size;
  const tail = Math.sin(f.tailPhase) * 0.3;
  // Tail
  ctx.fillStyle = f.color.fin;
  ctx.globalAlpha = 0.8;
  ctx.beginPath();
  ctx.moveTo(-s, 0);
  ctx.lineTo(-s * 1.5, -s * 0.5 + tail * s);
  ctx.lineTo(-s * 1.5, s * 0.5 + tail * s);
  ctx.closePath(); ctx.fill();
  // Body
  ctx.fillStyle = f.color.body;
  ctx.globalAlpha = 0.85;
  ctx.beginPath();
  ctx.ellipse(0, 0, s, s * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Eye
  ctx.fillStyle = '#fff'; ctx.globalAlpha = 0.9;
  ctx.beginPath(); ctx.arc(s * 0.5, -s * 0.1, s * 0.15, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(s * 0.55, -s * 0.1, s * 0.07, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawNemo(n) {
  ctx.save();
  ctx.translate(n.x, n.y);
  ctx.scale(n.vx > 0 ? 1 : -1, 1);
  const s = n.size;
  const tail = Math.sin(n.tailPhase) * 0.4;
  // Tail
  ctx.fillStyle = '#ff8833'; ctx.globalAlpha = 0.9;
  ctx.beginPath();
  ctx.moveTo(-s, 0);
  ctx.lineTo(-s * 1.6, -s * 0.6 + tail * s);
  ctx.lineTo(-s * 1.6, s * 0.6 + tail * s);
  ctx.closePath(); ctx.fill();
  // Body
  ctx.fillStyle = '#ff6622'; ctx.globalAlpha = 0.95;
  ctx.beginPath(); ctx.ellipse(0, 0, s, s * 0.55, 0, 0, Math.PI * 2); ctx.fill();
  // White stripes
  ctx.fillStyle = '#ffffff'; ctx.globalAlpha = 0.9;
  ctx.fillRect(-s * 0.15, -s * 0.55, s * 0.2, s * 1.1);
  ctx.fillRect(s * 0.35, -s * 0.45, s * 0.15, s * 0.9);
  ctx.fillRect(-s * 0.65, -s * 0.4, s * 0.15, s * 0.8);
  // Eye
  ctx.fillStyle = '#fff'; ctx.globalAlpha = 1;
  ctx.beginPath(); ctx.arc(s * 0.5, -s * 0.05, s * 0.18, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(s * 0.55, -s * 0.05, s * 0.09, 0, Math.PI*2); ctx.fill();
  // Dorsal fin
  ctx.fillStyle = '#ff8833'; ctx.globalAlpha = 0.8;
  ctx.beginPath();
  ctx.moveTo(-s * 0.3, -s * 0.5);
  ctx.quadraticCurveTo(0, -s * 0.9, s * 0.3, -s * 0.5);
  ctx.fill();
  ctx.restore();
}

// ── Main loop ──
let lastTime = performance.now();

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = (now - lastTime) / 1000;
  lastTime = now;

  smoothWindX *= WIND_DECAY;
  smoothWindY *= WIND_DECAY;

  ctx.clearRect(0, 0, W, H);

  // Light rays
  lightRays.forEach(r => {
    r.phase += 0.005;
    const sway = Math.sin(r.phase) * 30 + smoothWindX * 15 * windAt(r.x, H * 0.5);
    const alpha = r.alpha + Math.sin(now * 0.001 + r.phase) * 0.015;
    const grad = ctx.createLinearGradient(r.x + sway, 0, r.x + sway + r.width * 0.3, H);
    grad.addColorStop(0, `rgba(120,200,255,${alpha * 2})`);
    grad.addColorStop(0.5, `rgba(80,180,220,${alpha})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(r.x + sway - r.width / 2, 0);
    ctx.lineTo(r.x + sway + r.width / 2, 0);
    ctx.lineTo(r.x + sway + r.width * 0.8 + 20, H);
    ctx.lineTo(r.x + sway - r.width * 0.3 - 20, H);
    ctx.closePath(); ctx.fill();
  });

  // Fish
  ctx.globalAlpha = 1;
  fishes.forEach(f => {
    f.tailPhase += 0.08;
    f.x += f.vx + smoothWindX * 3 * dt * windAt(f.x, f.y);
    f.y += f.vy + Math.sin(now * 0.002 + f.x * 0.01) * 0.15;
    const dx = f.x - mousePos.x, dy = f.y - mousePos.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 80 && dist > 0) {
      f.vx += (dx / dist) * 0.15;
      f.vy += (dy / dist) * 0.1;
    }
    f.vx = clamp(f.vx, -2, 2);
    f.vy = clamp(f.vy, -0.8, 0.8);
    f.vy *= 0.99;
    if (f.dir > 0 && f.x > W + 30) f.x = -30;
    if (f.dir < 0 && f.x < -30) f.x = W + 30;
    f.dir = f.vx > 0 ? 1 : -1;
    drawFish(f);
  });

  // Nemos
  nemos = nemos.filter(n => {
    n.life -= dt;
    if (n.life <= 0) return false;
    n.tailPhase += 0.12;
    n.wiggle += 0.05;
    n.x += n.vx;
    n.y += n.vy + Math.sin(n.wiggle) * 0.5;
    n.vy *= 0.995;
    n.vx *= 0.999;
    const dx = mousePos.x - n.x, dy = mousePos.y - n.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 150 && dist > 30) {
      n.vx += (dx / dist) * 0.02;
      n.vy += (dy / dist) * 0.02;
    }
    if (n.x > W + 30) n.x = -30;
    if (n.x < -30) n.x = W + 30;
    ctx.globalAlpha = n.life < 1 ? n.life : 1;
    drawNemo(n);
    return true;
  });

  // Bubbles
  if (Math.random() < 0.03) emitBubble();
  ctx.globalAlpha = 1;
  bubbles = bubbles.filter(b => {
    b.x += Math.sin(now * 0.003 + b.x) * 0.2 + smoothWindX * 2 * dt * windAt(b.x, b.y);
    b.y += b.vy;
    b.alpha -= 0.001;
    if (b.y < -10 || b.alpha <= 0) return false;
    ctx.globalAlpha = b.alpha;
    ctx.strokeStyle = 'rgba(150,220,255,0.6)';
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = 'rgba(200,240,255,0.3)';
    ctx.beginPath(); ctx.arc(b.x - b.size * 0.25, b.y - b.size * 0.25, b.size * 0.3, 0, Math.PI * 2); ctx.fill();
    return true;
  });

  ctx.globalAlpha = 1;
}

buildFish();
buildLightRays();
animate();
</script>
</body></html>
