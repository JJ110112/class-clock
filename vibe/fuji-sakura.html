<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; }
  body {
    overflow:hidden;
    cursor:default;
    background: url('../img/Mount Fuji.jpg') center/cover no-repeat;
  }
</style>
</head>
<body>
<script src="../js/celestial.js"></script>
<script src="../js/phaser.min.js"></script>
<script>
/* ═══════════════════════════════
   富士櫻花 – Fuji Sakura (daytime)
   ═══════════════════════════════ */

let smoothWindX = 0, smoothWindY = 0;
const WIND_DECAY = 0.91, WIND_GAIN = 1.8;
let mouseX = -999, mouseY = -999;
const WIND_RADIUS = 220;
function windAt(x, y) {
  const dx = x - mouseX, dy = y - mouseY;
  const d = Math.sqrt(dx*dx + dy*dy);
  return d < WIND_RADIUS ? 1 - d / WIND_RADIUS : 0;
}

const sun = new CelestialBody({ type: 'sun', radius: 22 });

const DENSITIES = [
  { label: '春風拂面', petals: 40,  sparkles: 20 },
  { label: '花見日和', petals: 80,  sparkles: 40 },
  { label: '花吹雪舞', petals: 150, sparkles: 70 },
];
let densityIdx = 1;
let scene = null;

function onMouseMove(d) {
  mouseX = d.x; mouseY = d.y;
  smoothWindX += d.windVX * d.windStrength * WIND_GAIN;
  smoothWindY += d.windVY * d.windStrength * WIND_GAIN;
}

window.addEventListener('message', (e) => {
  if (e.data.type === 'mousemove') onMouseMove(e.data);
  if (e.data.type === 'time') { sun.setTime(e.data.hours, e.data.minutes); }
  if (e.data.type === 'density') {
    densityIdx = (densityIdx + e.data.dir + DENSITIES.length) % DENSITIES.length;
    if (scene) scene.rebuild();
    parent.postMessage({ type: 'densityLabel', label: DENSITIES[densityIdx].label }, '*');
  }
  if (e.data.type === 'click') {
    if (!sun.handleClick(e.data.x, e.data.y) && scene) scene.handleClick(e.data.x, e.data.y);
  }
});

const W = window.innerWidth, H = window.innerHeight;
const PETAL_COLORS = [0xffb7c5, 0xffc0cb, 0xffe4e1, 0xff99aa, 0xffd1dc];
const LAKE_Y = H * 0.58;

class FujiSakuraScene extends Phaser.Scene {
  constructor() { super('fuji-sakura'); }

  create() {
    scene = this;
    this.petals = [];
    this.sparkles = [];
    this.clickBlossoms = [];
    this.ripples = [];
    this.rippleG = this.add.graphics().setDepth(7);
    this.rebuild();
  }

  rebuild() {
    this.petals.forEach(p => p.g.destroy());
    this.petals = [];
    const pc = DENSITIES[densityIdx].petals;
    for (let i = 0; i < pc; i++) this.petals.push(this.createPetal(true));
    this.sparkles.forEach(s => s.g.destroy());
    this.sparkles = [];
    const sc = DENSITIES[densityIdx].sparkles;
    for (let i = 0; i < sc; i++) this.sparkles.push(this.createSparkle());
  }

  createPetal(init) {
    const x = Phaser.Math.Between(0, W);
    const y = init ? Phaser.Math.Between(0, H * 0.8) : Phaser.Math.Between(-40, -5);
    const size = Phaser.Math.FloatBetween(3, 8);
    const color = Phaser.Utils.Array.GetRandom(PETAL_COLORS);
    const g = this.add.graphics().setDepth(8);
    g.fillStyle(color, Phaser.Math.FloatBetween(0.4, 0.8));
    g.fillEllipse(0, 0, size * 2.5, size * 1.2);
    g.setPosition(x, y);
    return {
      g, size,
      baseSpeed: Phaser.Math.FloatBetween(0.3, 1.0),
      swingPhase: Phaser.Math.FloatBetween(0, Math.PI * 2),
      swingSpeed: Phaser.Math.FloatBetween(0.008, 0.022),
      swingAmp: Phaser.Math.FloatBetween(0.5, 2.2),
      rotSpeed: Phaser.Math.FloatBetween(-0.02, 0.02),
    };
  }

  createSparkle() {
    const x = Phaser.Math.Between(W * 0.05, W * 0.95);
    const y = Phaser.Math.Between(LAKE_Y + 5, H - 10);
    const g = this.add.graphics().setDepth(4);
    return {
      g, x, y,
      size: Phaser.Math.FloatBetween(1, 3),
      phase: Phaser.Math.FloatBetween(0, Math.PI * 2),
      speed: Phaser.Math.FloatBetween(0.02, 0.06),
      drift: Phaser.Math.FloatBetween(-0.15, 0.15),
    };
  }

  handleClick(cx, cy) {
    if (cy > LAKE_Y) {
      this.spawnRipple(cx, cy);
    } else {
      this.spawnClickBlossoms(cx, cy);
    }
  }

  spawnClickBlossoms(cx, cy) {
    const count = 12 + Math.floor(Math.random() * 8);
    for (let i = 0; i < count; i++) {
      const size = Phaser.Math.FloatBetween(4, 11);
      const color = Phaser.Utils.Array.GetRandom(PETAL_COLORS);
      const g = this.add.graphics().setDepth(9);
      g.fillStyle(color, Phaser.Math.FloatBetween(0.5, 0.85));
      for (let p = 0; p < 5; p++) {
        const angle = (p / 5) * Math.PI * 2 - Math.PI / 2;
        const px = Math.cos(angle) * size * 0.5;
        const py = Math.sin(angle) * size * 0.5;
        g.fillEllipse(px, py, size * 0.7, size * 0.4);
      }
      g.fillStyle(0xffeeaa, 0.8);
      g.fillCircle(0, 0, size * 0.15);
      g.setPosition(cx, cy);

      const angle = Phaser.Math.FloatBetween(0, Math.PI * 2);
      const speed = Phaser.Math.FloatBetween(40, 140);
      this.clickBlossoms.push({
        g,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 35,
        rotSpeed: Phaser.Math.FloatBetween(-0.04, 0.04),
        life: Phaser.Math.FloatBetween(2.5, 4.5),
        maxLife: 4.5,
      });
    }
  }

  spawnRipple(cx, cy) {
    this.ripples.push({ x: cx, y: cy, radius: 2, maxRadius: 60 + Math.random() * 40, alpha: 0.6, speed: 45 });
  }

  update(time, delta) {
    const dt = delta / 1000;
    smoothWindX *= WIND_DECAY;
    smoothWindY *= WIND_DECAY;
    sun.update(dt);

    // Petals
    this.petals.forEach(p => {
      p.swingPhase += p.swingSpeed;
      const pw = windAt(p.g.x, p.g.y);
      p.g.x += Math.sin(p.swingPhase) * p.swingAmp + smoothWindX * 38 * dt * pw;
      p.g.y += p.baseSpeed + smoothWindY * 12 * dt * pw;
      p.g.rotation += p.rotSpeed + smoothWindX * 0.008 * pw;

      if (p.g.y > H + 10) {
        p.g.x = Phaser.Math.Between(0, W);
        p.g.y = Phaser.Math.Between(-40, -5);
      }
      if (p.g.x < -60 || p.g.x > W + 60) {
        p.g.x = Phaser.Math.Between(0, W);
        p.g.y = Phaser.Math.Between(-40, -5);
      }
    });

    // Click blossoms
    this.clickBlossoms = this.clickBlossoms.filter(b => {
      b.life -= dt;
      if (b.life <= 0) { b.g.destroy(); return false; }
      b.g.x += (b.vx + smoothWindX * 30 * windAt(b.g.x, b.g.y)) * dt;
      b.g.y += b.vy * dt;
      b.vy += 28 * dt;
      b.g.rotation += b.rotSpeed;
      b.g.alpha = Math.min(1, b.life / b.maxLife * 1.5);
      return true;
    });

    // Sparkles
    this.sparkles.forEach(s => {
      s.phase += s.speed;
      s.x += s.drift;
      if (s.x < 0) s.x = W;
      if (s.x > W) s.x = 0;
      const a = (Math.sin(s.phase) + 1) * 0.4;
      s.g.clear();
      s.g.fillStyle(0xffffff, a);
      s.g.fillCircle(s.x, s.y, s.size);
    });

    // Ripples
    this.rippleG.clear();
    this.ripples = this.ripples.filter(r => {
      r.radius += r.speed * dt;
      r.alpha -= dt * 0.5;
      if (r.alpha <= 0 || r.radius >= r.maxRadius) return false;
      this.rippleG.lineStyle(1, 0xffffff, r.alpha * 0.6);
      this.rippleG.strokeCircle(r.x, r.y, r.radius);
      if (r.radius > 10) {
        this.rippleG.lineStyle(1, 0xffffff, r.alpha * 0.3);
        this.rippleG.strokeCircle(r.x, r.y, r.radius * 0.6);
      }
      return true;
    });
  }
}

new Phaser.Game({
  type: Phaser.AUTO, width: W, height: H, transparent: true,
  scene: FujiSakuraScene, banner: false,
  scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH },
});
</script>
</body></html>
