<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; }
  body { overflow:hidden; background:#0a0e15; cursor:default; }
</style>
</head>
<body>
<script src="../js/celestial.js"></script>
<script src="../js/phaser.min.js"></script>
<script>
/* ═══════════════════════════════
   夜雨 – Night Rain
   ═══════════════════════════════ */

let smoothWindX = 0, smoothWindY = 0;
const WIND_DECAY = 0.85, WIND_GAIN = 0.6;
let mouseX = -999, mouseY = -999;
const WIND_RADIUS = 200;
function windAt(x, y) { const dx=x-mouseX, dy=y-mouseY, d=Math.sqrt(dx*dx+dy*dy); return d<WIND_RADIUS?1-d/WIND_RADIUS:0; }
const moon = new CelestialBody({ type: 'moon', radius: 14 });

const DENSITIES = [
  { label: '小雨',   count: 100 },
  { label: '中雨',   count: 300 },
  { label: '大雨',   count: 600 },
];
let densityIdx = 1;
let scene = null;

function onMouseMove(d) {
  mouseX = d.x; mouseY = d.y;
  smoothWindX += d.windVX * d.windStrength * WIND_GAIN;
  smoothWindY += d.windVY * d.windStrength * WIND_GAIN;
}

window.addEventListener('message', (e) => {
  if (e.data.type === 'mousemove') onMouseMove(e.data);
  if (e.data.type === 'time') { moon.setTime(e.data.hours, e.data.minutes); }
  if (e.data.type === 'density') {
    densityIdx = (densityIdx + e.data.dir + DENSITIES.length) % DENSITIES.length;
    if (scene) scene.rebuildRain();
    parent.postMessage({ type: 'densityLabel', label: DENSITIES[densityIdx].label }, '*');
  }
  if (e.data.type === 'click') moon.handleClick(e.data.x, e.data.y);
});

const W = window.innerWidth, H = window.innerHeight;

class NightRainScene extends Phaser.Scene {
  constructor() { super('night-rain'); }

  create() {
    scene = this;
    const bg = this.add.graphics();
    bg.fillGradientStyle(0x0f141e, 0x0a0e15, 0x070a10, 0x050810, 1);
    bg.fillRect(0, 0, W, H).setDepth(-10);

    this.rain = [];
    this.rebuildRain();

    // Lightning
    this.nextLightning = Phaser.Math.Between(5000, 15000);
    this.lightningFlash = this.add.rectangle(W/2, H/2, W, H, 0xffffff, 0).setDepth(20);
  }

  rebuildRain() {
    this.rain.forEach(r => r.g.destroy());
    this.rain = [];
    const count = DENSITIES[densityIdx].count;
    for (let i = 0; i < count; i++) this.rain.push(this.createRain(true));
  }

  createRain(init) {
    const x = Phaser.Math.Between(-50, W + 50);
    const y = init ? Phaser.Math.Between(0, H) : Phaser.Math.Between(-80, -5);
    const len = Phaser.Math.FloatBetween(14, 28);
    const speed = Phaser.Math.FloatBetween(14, 26);
    const thick = Phaser.Math.FloatBetween(0.5, 1.8);
    const g = this.add.graphics();
    g.lineStyle(thick, 0x6b9fd8, Phaser.Math.FloatBetween(0.15, 0.45));
    g.lineBetween(0, 0, -speed * 0.08, len);
    g.setPosition(x, y).setDepth(2);
    return { g, speed, len, thick };
  }

  update(time, delta) {
    const dt = delta / 1000;
    smoothWindX *= WIND_DECAY;
    smoothWindY *= WIND_DECAY;
    moon.update(dt);

    this.rain.forEach(r => {
      const rw = windAt(r.g.x, r.g.y);
      const windTilt = Phaser.Math.Clamp(smoothWindX * 0.08 * rw, -0.3, 0.3);
      const windPush = Phaser.Math.Clamp(smoothWindX * 8 * rw, -60, 60);
      r.g.x += (-r.speed * 0.12 + windPush) * dt * 60;
      r.g.y += r.speed;
      r.g.rotation = windTilt;
      if (r.g.y > H + 10) {
        r.g.x = Phaser.Math.Between(-50, W + 50);
        r.g.y = Phaser.Math.Between(-80, -5);
      }
    });

    // Lightning
    this.nextLightning -= delta;
    if (this.nextLightning <= 0) {
      this.nextLightning = Phaser.Math.Between(6000, 20000);
      this.lightningFlash.alpha = 0.7;
      this.tweens.add({
        targets: this.lightningFlash, alpha: 0, duration: 200, ease: 'Power2',
        onComplete: () => {
          this.time.delayedCall(80, () => {
            this.lightningFlash.alpha = 0.3;
            this.tweens.add({ targets: this.lightningFlash, alpha: 0, duration: 150 });
          });
        }
      });
    }

  }
}

new Phaser.Game({
  type: Phaser.AUTO, width: W, height: H, transparent: true,
  scene: NightRainScene, banner: false,
  scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH },
});
</script>
</body></html>
