<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; }
  body { overflow:hidden; background:#020208; cursor:default; }
  canvas { display:block; }
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.183.0/build/three.module.js"
  }
}
</script>
<script type="module">
import * as THREE from 'three';

/* ═══════════════════════════════
   星空銀河 – Starry Galaxy (Three.js)
   ═══════════════════════════════ */

// ── Wind / mouse state ──
let smoothWindX = 0, smoothWindY = 0;
const WIND_DECAY = 0.95, WIND_GAIN = 0.8;
let mouseNX = 0, mouseNY = 0; // normalized -1..1

// ── Galaxy color palettes ──
const PALETTES = [
  { label: '經典銀河', inner: new THREE.Color(0xff6030), outer: new THREE.Color(0x1b3984) },
  { label: '極光銀河', inner: new THREE.Color(0x00ffaa), outer: new THREE.Color(0x2200aa) },
  { label: '玫瑰星雲', inner: new THREE.Color(0xff88cc), outer: new THREE.Color(0x4400aa) },
  { label: '烈焰銀河', inner: new THREE.Color(0xffaa00), outer: new THREE.Color(0xff0044) },
  { label: '冰晶星河', inner: new THREE.Color(0xaaeeff), outer: new THREE.Color(0x0022aa) },
  { label: '紫霧銀河', inner: new THREE.Color(0xdd88ff), outer: new THREE.Color(0x1a0044) },
];
let paletteIdx = 0;

// ── Shooting stars ──
let shootingStars = [];
let nextAutoShoot = 3000 + Math.random() * 7000;

function onMouseMove(d) {
  mouseNX = (d.x / window.innerWidth) * 2 - 1;
  mouseNY = (d.y / window.innerHeight) * 2 - 1;
  smoothWindX += d.windVX * d.windStrength * WIND_GAIN;
  smoothWindY += d.windVY * d.windStrength * WIND_GAIN;
}

window.addEventListener('message', (e) => {
  if (e.data.type === 'mousemove') onMouseMove(e.data);
  if (e.data.type === 'density') {
    paletteIdx = (paletteIdx + e.data.dir + PALETTES.length) % PALETTES.length;
    updateGalaxyColors();
    parent.postMessage({ type: 'densityLabel', label: PALETTES[paletteIdx].label }, '*');
  }
  if (e.data.type === 'click') {
    spawnMeteorShower(e.data.x, e.data.y);
  }
});

// ═══════════════════════════════
//  Three.js Setup
// ═══════════════════════════════
const W = window.innerWidth, H = window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 100);
camera.position.set(0, 3, 5);
camera.lookAt(0, 0, 0);

// ═══════════════════════════════
//  Galaxy Parameters
// ═══════════════════════════════
const GALAXY = {
  count: 50000,
  radius: 5,
  branches: 4,
  spin: 1.5,
  randomness: 0.4,
  randomnessPow: 3,
  insideColor: PALETTES[0].inner.clone(),
  outsideColor: PALETTES[0].outer.clone(),
};

let galaxyGeometry = null;
let galaxyMaterial = null;
let galaxyPoints = null;

function generateGalaxy() {
  // Cleanup
  if (galaxyPoints) {
    galaxyGeometry.dispose();
    galaxyMaterial.dispose();
    scene.remove(galaxyPoints);
  }

  galaxyGeometry = new THREE.BufferGeometry();
  const positions = new Float32Array(GALAXY.count * 3);
  const colors = new Float32Array(GALAXY.count * 3);

  for (let i = 0; i < GALAXY.count; i++) {
    const i3 = i * 3;
    const radius = Math.random() * GALAXY.radius;
    const spinAngle = radius * GALAXY.spin;
    const branchAngle = (i % GALAXY.branches) / GALAXY.branches * Math.PI * 2;

    // Randomness with power curve (more concentrated near center)
    const rx = Math.pow(Math.random(), GALAXY.randomnessPow) * (Math.random() < 0.5 ? 1 : -1) * GALAXY.randomness * radius;
    const ry = Math.pow(Math.random(), GALAXY.randomnessPow) * (Math.random() < 0.5 ? 1 : -1) * GALAXY.randomness * radius * 0.3;
    const rz = Math.pow(Math.random(), GALAXY.randomnessPow) * (Math.random() < 0.5 ? 1 : -1) * GALAXY.randomness * radius;

    positions[i3]     = Math.cos(branchAngle + spinAngle) * radius + rx;
    positions[i3 + 1] = ry;
    positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + rz;

    // Color: lerp from inside to outside
    const mixedColor = GALAXY.insideColor.clone();
    mixedColor.lerp(GALAXY.outsideColor, radius / GALAXY.radius);
    colors[i3]     = mixedColor.r;
    colors[i3 + 1] = mixedColor.g;
    colors[i3 + 2] = mixedColor.b;
  }

  galaxyGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  galaxyGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  galaxyMaterial = new THREE.PointsMaterial({
    size: 0.02,
    sizeAttenuation: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    vertexColors: true,
  });

  galaxyPoints = new THREE.Points(galaxyGeometry, galaxyMaterial);
  scene.add(galaxyPoints);
}

function updateGalaxyColors() {
  const palette = PALETTES[paletteIdx];
  GALAXY.insideColor.copy(palette.inner);
  GALAXY.outsideColor.copy(palette.outer);

  // Smoothly update existing particle colors
  const colors = galaxyGeometry.attributes.color.array;
  const positions = galaxyGeometry.attributes.position.array;
  for (let i = 0; i < GALAXY.count; i++) {
    const i3 = i * 3;
    const px = positions[i3], pz = positions[i3 + 2];
    const dist = Math.sqrt(px * px + pz * pz);
    const t = Math.min(dist / GALAXY.radius, 1);
    const c = GALAXY.insideColor.clone().lerp(GALAXY.outsideColor, t);
    colors[i3] = c.r;
    colors[i3 + 1] = c.g;
    colors[i3 + 2] = c.b;
  }
  galaxyGeometry.attributes.color.needsUpdate = true;
}

// ═══════════════════════════════
//  Background stars (static)
// ═══════════════════════════════
function createBackgroundStars() {
  const count = 2000;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    pos[i * 3]     = (Math.random() - 0.5) * 40;
    pos[i * 3 + 1] = (Math.random() - 0.5) * 40;
    pos[i * 3 + 2] = (Math.random() - 0.5) * 40;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({
    size: 0.015,
    color: 0xccccff,
    sizeAttenuation: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    transparent: true,
    opacity: 0.6,
  });
  scene.add(new THREE.Points(geo, mat));
}

// ═══════════════════════════════
//  Shooting Stars (2D overlay)
// ═══════════════════════════════
const overlayCanvas = document.createElement('canvas');
overlayCanvas.width = W;
overlayCanvas.height = H;
overlayCanvas.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:1;';
document.body.appendChild(overlayCanvas);
const ctx = overlayCanvas.getContext('2d');

function spawnMeteorShower(cx, cy) {
  const count = 8 + Math.floor(Math.random() * 8);
  for (let i = 0; i < count; i++) {
    const delay = i * (30 + Math.random() * 100);
    setTimeout(() => {
      const ox = cx + (Math.random() - 0.5) * 80;
      const oy = cy + (Math.random() - 0.5) * 40;
      const angle = 0.2 + Math.random() * 0.8;
      const speed = 400 + Math.random() * 600;
      const tailColors = ['#c4b5fd', '#93c5fd', '#fcd34d', '#ffa0c0'];
      shootingStars.push({
        x: ox, y: oy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 0.4 + Math.random() * 0.6,
        maxLife: 0.4 + Math.random() * 0.6,
        tailLen: 25 + Math.random() * 40,
        color: tailColors[Math.floor(Math.random() * tailColors.length)],
      });
    }, delay);
  }
}

function spawnAutoShootingStar() {
  const x = Math.random() * W * 0.8 + W * 0.1;
  const y = Math.random() * H * 0.4;
  const angle = 0.3 + Math.random() * 0.5;
  const speed = 600 + Math.random() * 600;
  shootingStars.push({
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    life: 0.5 + Math.random() * 0.8,
    maxLife: 0.5 + Math.random() * 0.8,
    tailLen: 30 + Math.random() * 50,
    color: '#ffffff',
  });
}

function updateShootingStars(dt) {
  ctx.clearRect(0, 0, W, H);

  // Auto shooting stars
  nextAutoShoot -= dt * 1000;
  if (nextAutoShoot <= 0) {
    nextAutoShoot = 3000 + Math.random() * 8000;
    spawnAutoShootingStar();
  }

  shootingStars = shootingStars.filter(s => {
    s.life -= dt;
    if (s.life <= 0) return false;
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    const alpha = Math.max(0, s.life / s.maxLife);

    // Head
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, 1.5, 0, Math.PI * 2);
    ctx.fill();

    // Tail
    const angle = Math.atan2(s.vy, s.vx);
    const tx = s.x - Math.cos(angle) * s.tailLen;
    const ty = s.y - Math.sin(angle) * s.tailLen;
    const grad = ctx.createLinearGradient(s.x, s.y, tx, ty);
    grad.addColorStop(0, `rgba(255,255,255,${alpha})`);
    grad.addColorStop(1, `rgba(255,255,255,0)`);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(s.x, s.y);
    ctx.lineTo(tx, ty);
    ctx.stroke();

    // Color tail
    const tx2 = s.x - Math.cos(angle) * s.tailLen * 1.8;
    const ty2 = s.y - Math.sin(angle) * s.tailLen * 1.8;
    ctx.globalAlpha = alpha * 0.35;
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx2, ty2);
    ctx.stroke();

    return true;
  });
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════
//  Moon (2D overlay)
// ═══════════════════════════════
let currentHour = new Date().getHours(), currentMin = new Date().getMinutes();
window.addEventListener('message', (e) => {
  if (e.data.type === 'time') { currentHour = e.data.hours; currentMin = e.data.minutes; }
});

function drawMoon() {
  const t = currentHour + currentMin / 60;
  const prog = ((t < 12 ? t + 24 : t) - 18) / 12;
  const p = Math.max(0, Math.min(1, prog));
  const mx = W * 0.1 + p * W * 0.8;
  const my = H * 0.08 + Math.sin(p * Math.PI) * (-H * 0.05);
  const alpha = p > 0 && p < 1 ? 0.6 : 0.1;

  // Glow
  ctx.globalAlpha = alpha * 0.1;
  const glow = ctx.createRadialGradient(mx, my, 0, mx, my, 50);
  glow.addColorStop(0, '#e2e8f0');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(mx - 55, my - 55, 110, 110);

  // Disc
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#e2e8f0';
  ctx.beginPath();
  ctx.arc(mx, my, 16, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

// ═══════════════════════════════
//  Init & Animation Loop
// ═══════════════════════════════
generateGalaxy();
createBackgroundStars();

const clock = new THREE.Clock();
let targetCamX = 0, targetCamY = 3;

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  smoothWindX *= WIND_DECAY;
  smoothWindY *= WIND_DECAY;

  // Galaxy rotation
  if (galaxyPoints) {
    galaxyPoints.rotation.y = elapsed * 0.08;
  }

  // Camera responds to mouse (gentle orbit)
  targetCamX = mouseNX * 1.5;
  targetCamY = 3 - mouseNY * 1.0;
  camera.position.x += (targetCamX - camera.position.x) * 0.02;
  camera.position.y += (targetCamY - camera.position.y) * 0.02;
  camera.lookAt(0, 0, 0);

  renderer.render(scene, camera);

  // 2D overlay
  updateShootingStars(dt);
  drawMoon();
}

animate();

// Resize
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  overlayCanvas.width = w;
  overlayCanvas.height = h;
});
</script>
</body></html>
