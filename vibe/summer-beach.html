<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; }
  body { overflow:hidden; background: url('../img/Summer beach.jpg') center/cover no-repeat; cursor:default; }
</style>
</head>
<body>
<script src="../js/celestial.js"></script>
<script src="../js/phaser.min.js"></script>
<script>
/* ═══════════════════════════════
   夏日海灘 – Summer Beach
   (photo background version)
   ═══════════════════════════════ */

let smoothWindX = 0, smoothWindY = 0;
const WIND_DECAY = 0.90, WIND_GAIN = 1.2;
const WIND_RADIUS = 200;
function windAt(x, y) { const dx=x-mousePos.x, dy=y-mousePos.y, d=Math.sqrt(dx*dx+dy*dy); return d<WIND_RADIUS?1-d/WIND_RADIUS:0; }
let mousePos = { x: -999, y: -999 };

const sun = new CelestialBody({ type: 'sun', radius: 22 });

const DENSITIES = [
  { label: '微風徐徐', seagulls: 2,  sparkles: 15 },
  { label: '海風吹拂', seagulls: 5,  sparkles: 35 },
  { label: '浪花朵朵', seagulls: 8,  sparkles: 60 },
];
let densityIdx = 1;
let scene = null;

function onMouseMove(d) {
  mousePos.x = d.x; mousePos.y = d.y;
  smoothWindX += d.windVX * d.windStrength * WIND_GAIN;
  smoothWindY += d.windVY * d.windStrength * WIND_GAIN;
}

window.addEventListener('message', (e) => {
  if (e.data.type === 'mousemove') onMouseMove(e.data);
  if (e.data.type === 'time') { sun.setTime(e.data.hours, e.data.minutes); }
  if (e.data.type === 'density') {
    densityIdx = (densityIdx + e.data.dir + DENSITIES.length) % DENSITIES.length;
    if (scene) scene.rebuild();
    parent.postMessage({ type: 'densityLabel', label: DENSITIES[densityIdx].label }, '*');
  }
  if (e.data.type === 'click') {
    if (!sun.handleClick(e.data.x, e.data.y) && scene) scene.handleClick(e.data.x, e.data.y);
  }
});

const W = window.innerWidth, H = window.innerHeight;
// Approximate zones: left = ocean, right = sand
const OCEAN_X = W * 0.45;

class SummerBeachScene extends Phaser.Scene {
  constructor() { super('summer-beach'); }

  create() {
    scene = this;

    this.seagulls = [];
    this.sparkles = [];
    this.splashes = [];
    this.sandCastles = [];
    this.splashG = this.add.graphics().setDepth(8);
    this.castleG = this.add.graphics().setDepth(3);

    this.rebuild();
  }

  rebuild() {
    this.seagulls.forEach(s => s.g.destroy());
    this.sparkles.forEach(s => s.g.destroy());
    const d = DENSITIES[densityIdx];

    // Seagulls
    this.seagulls = [];
    for (let i = 0; i < d.seagulls; i++) {
      const x = Phaser.Math.Between(0, W);
      const y = Phaser.Math.Between(H * 0.06, H * 0.35);
      const dir = Math.random() > 0.5 ? 1 : -1;
      const g = this.add.graphics().setPosition(x, y).setDepth(6);
      this.seagulls.push({
        g, dir,
        vx: dir * Phaser.Math.FloatBetween(0.3, 1.0),
        vy: Phaser.Math.FloatBetween(-0.1, 0.1),
        wingPhase: Phaser.Math.FloatBetween(0, Math.PI * 2),
        wingSpeed: Phaser.Math.FloatBetween(0.04, 0.08),
        fleeVX: 0, fleeVY: 0,
      });
    }

    // Water sparkles (on ocean side)
    this.sparkles = [];
    for (let i = 0; i < d.sparkles; i++) {
      const x = Phaser.Math.Between(0, OCEAN_X);
      const y = Phaser.Math.FloatBetween(H * 0.3, H * 0.8);
      const g = this.add.circle(x, y, Phaser.Math.FloatBetween(1.5, 3.5), 0xffffff, 0).setDepth(2);
      this.sparkles.push({
        g, phase: Phaser.Math.FloatBetween(0, Math.PI * 2),
        speed: Phaser.Math.FloatBetween(0.03, 0.08),
      });
    }
  }

  handleClick(cx, cy) {
    if (cx < OCEAN_X) {
      // Ocean side → splash
      this.spawnSplash(cx, cy);
    } else {
      // Sand side → build sand castle
      this.spawnSandCastle(cx, cy);
    }
  }

  spawnSplash(cx, cy) {
    const count = 15 + Math.floor(Math.random() * 10);
    for (let i = 0; i < count; i++) {
      const angle = Phaser.Math.FloatBetween(-Math.PI, 0); // upward arc
      const speed = Phaser.Math.FloatBetween(60, 200);
      this.splashes.push({
        x: cx, y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: Phaser.Math.FloatBetween(2, 6),
        life: Phaser.Math.FloatBetween(0.6, 1.5),
        maxLife: 1.5,
        color: Phaser.Utils.Array.GetRandom([0xffffff, 0xd0eeff, 0xa0d8f0]),
      });
    }
  }

  spawnSandCastle(cx, cy) {
    // Limit sand castles
    if (this.sandCastles.length >= 8) {
      const oldest = this.sandCastles.shift();
    }
    this.sandCastles.push({
      x: cx, y: cy,
      size: Phaser.Math.FloatBetween(0.6, 1.2),
      life: 20, // fade after 20s
      built: 0, // animation: grows from 0 to 1
    });
  }

  update(time, delta) {
    const dt = delta / 1000;
    smoothWindX *= WIND_DECAY;
    smoothWindY *= WIND_DECAY;

    sun.update(dt);

    // ── Seagulls ──
    const avoidR = 120;
    this.seagulls.forEach(s => {
      const dx = s.g.x - mousePos.x, dy = s.g.y - mousePos.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < avoidR && dist > 0) {
        s.fleeVX += (dx / dist) * 3 * (1 - dist / avoidR);
        s.fleeVY += (dy / dist) * 3 * (1 - dist / avoidR);
        s.wingSpeed = 0.12;
      } else {
        s.wingSpeed = Phaser.Math.Linear(s.wingSpeed, 0.06, 0.02);
      }
      s.fleeVX *= 0.94; s.fleeVY *= 0.94;
      s.g.x += s.vx + s.fleeVX + smoothWindX * 8 * dt * windAt(s.g.x, s.g.y);
      s.g.y += s.vy + s.fleeVY;
      if (s.g.y < -20) s.g.y = -20;
      if (s.g.y > H * 0.4) s.vy = -Math.abs(s.vy);
      if (s.g.y < H * 0.03) s.vy = Math.abs(s.vy);
      if (s.dir > 0 && s.g.x > W + 50) { s.g.x = -50; s.g.y = Phaser.Math.Between(H * 0.06, H * 0.35); }
      if (s.dir < 0 && s.g.x < -50) { s.g.x = W + 50; s.g.y = Phaser.Math.Between(H * 0.06, H * 0.35); }

      s.wingPhase += s.wingSpeed;
      const wingY = Math.sin(s.wingPhase) * 6;
      const facing = s.vx + s.fleeVX > 0 ? 1 : -1;
      s.g.clear();
      s.g.lineStyle(2.5, 0x2a2a2a, 0.75);
      s.g.beginPath();
      s.g.moveTo(-10 * facing, wingY);
      s.g.lineTo(-3 * facing, wingY * 0.3);
      s.g.lineTo(0, 0);
      s.g.lineTo(3 * facing, wingY * 0.3);
      s.g.lineTo(10 * facing, wingY);
      s.g.strokePath();
    });

    // ── Sparkles ──
    this.sparkles.forEach(s => {
      s.phase += s.speed;
      s.g.alpha = (Math.sin(s.phase) + 1) / 2 * 0.85 + 0.1;
    });

    // ── Splashes ──
    this.splashG.clear();
    this.splashes = this.splashes.filter(s => {
      s.life -= dt;
      if (s.life <= 0) return false;
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vy += 300 * dt; // gravity
      const a = Math.min(1, s.life / s.maxLife);
      this.splashG.fillStyle(s.color, a * 0.8);
      this.splashG.fillCircle(s.x, s.y, s.size * a);
      return true;
    });

    // ── Sand castles ──
    this.castleG.clear();
    this.sandCastles = this.sandCastles.filter(c => {
      c.life -= dt;
      c.built = Math.min(1, c.built + dt * 2); // grow in 0.5s
      if (c.life <= 0) return false;
      const a = c.life < 2 ? c.life / 2 : 1;
      const s = c.size * c.built;
      const cx = c.x, cy = c.y;

      // Main tower
      this.castleG.fillStyle(0xd4b078, a * 0.9);
      this.castleG.fillRect(cx - 12 * s, cy - 30 * s, 24 * s, 30 * s);
      // Tower top (crenellations)
      for (let i = 0; i < 3; i++) {
        this.castleG.fillRect(cx - 12 * s + i * 9 * s, cy - 36 * s, 6 * s, 6 * s);
      }
      // Side towers
      this.castleG.fillStyle(0xc8a060, a * 0.85);
      this.castleG.fillRect(cx - 22 * s, cy - 20 * s, 12 * s, 20 * s);
      this.castleG.fillRect(cx + 10 * s, cy - 20 * s, 12 * s, 20 * s);
      // Side tower tops
      for (let i = 0; i < 2; i++) {
        this.castleG.fillRect(cx - 22 * s + i * 7 * s, cy - 24 * s, 5 * s, 4 * s);
        this.castleG.fillRect(cx + 10 * s + i * 7 * s, cy - 24 * s, 5 * s, 4 * s);
      }
      // Door
      this.castleG.fillStyle(0x8a6a40, a * 0.7);
      this.castleG.fillRect(cx - 4 * s, cy - 10 * s, 8 * s, 10 * s);
      // Flag
      this.castleG.lineStyle(1, 0x8a6a40, a);
      this.castleG.lineBetween(cx, cy - 36 * s, cx, cy - 50 * s);
      this.castleG.fillStyle(0xff4444, a * 0.8);
      this.castleG.fillTriangle(cx, cy - 50 * s, cx, cy - 42 * s, cx + 10 * s, cy - 46 * s);

      return true;
    });
  }
}

new Phaser.Game({
  type: Phaser.AUTO, width: W, height: H, transparent: true,
  scene: SummerBeachScene, banner: false,
  scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH },
});
</script>
</body></html>
