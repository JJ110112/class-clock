<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; }
  body { overflow:hidden; background: url('../img/Fireflies in forest.jpg') center/cover no-repeat; cursor:default; }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="../js/celestial.js"></script>
<script>
/* ═══════════════════════════════
   夏夜 – Summer Night Fireflies
   Pure Canvas (no Phaser)
   ═══════════════════════════════ */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
window.addEventListener('resize', () => { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; });

let smoothWindX = 0, smoothWindY = 0;
const WIND_DECAY = 0.92, WIND_GAIN = 1.2;
let mouseX = -999, mouseY = -999;
const WIND_RADIUS = 200;
function windAt(x, y) { const dx=x-mouseX, dy=y-mouseY, d=Math.sqrt(dx*dx+dy*dy); return d<WIND_RADIUS?1-d/WIND_RADIUS:0; }
const celestial = new CelestialBody({ type: 'moon', radius: 15 });

const DENSITIES = [
  { label: '螢光點點', count: 20 },
  { label: '螢火蟲群', count: 50 },
  { label: '螢河',     count: 120 },
];
let densityIdx = 1;

function onMouseMove(d) {
  mouseX = d.x; mouseY = d.y;
  smoothWindX += d.windVX * d.windStrength * WIND_GAIN;
  smoothWindY += d.windVY * d.windStrength * WIND_GAIN;
}

window.addEventListener('message', (e) => {
  if (e.data.type === 'mousemove') onMouseMove(e.data);
  if (e.data.type === 'time') { celestial.setTime(e.data.hours, e.data.minutes); }
  if (e.data.type === 'density') {
    densityIdx = (densityIdx + e.data.dir + DENSITIES.length) % DENSITIES.length;
    buildFireflies();
    parent.postMessage({ type: 'densityLabel', label: DENSITIES[densityIdx].label }, '*');
  }
  if (e.data.type === 'click') celestial.handleClick(e.data.x, e.data.y);
});

// ── Species: green, yellow-green, yellow, orange ──
const SPECIES = [
  { glow: '#4ade80', core: '#ccffcc', flashOn: [0.6, 1.2], flashOff: [1.0, 2.5] },
  { glow: '#ccdd44', core: '#eeffaa', flashOn: [0.4, 0.8], flashOff: [0.8, 2.0] },
  { glow: '#ffdd44', core: '#ffffbb', flashOn: [0.3, 0.6], flashOff: [1.0, 3.0] },
  { glow: '#ff9933', core: '#ffdd99', flashOn: [0.5, 1.0], flashOff: [1.5, 4.0] },
];

let fireflies = [];

function rand(a, b) { return a + Math.random() * (b - a); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function buildFireflies() {
  fireflies = [];
  const count = DENSITIES[densityIdx].count;
  for (let i = 0; i < count; i++) {
    const sp = SPECIES[i % SPECIES.length];
    const startLit = Math.random() < 0.5;
    fireflies.push({
      x: rand(0, W), y: rand(H * 0.1, H),
      vx: rand(-0.3, 0.3), vy: rand(-0.3, 0.3),
      sp,
      glowR: rand(15, 35),
      coreR: rand(2, 5),
      state: startLit ? 'on' : 'off',
      stateTimer: startLit ? rand(0.2, sp.flashOn[1]) : rand(0, 1.0),
      brightness: startLit ? rand(0.6, 1) : 0,
      flashDur: rand(sp.flashOn[0], sp.flashOn[1]),
      darkDur: rand(sp.flashOff[0], sp.flashOff[1]),
    });
  }
}

// ── Draw ──
let lastTime = performance.now();

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = (now - lastTime) / 1000;
  lastTime = now;

  smoothWindX *= WIND_DECAY;
  smoothWindY *= WIND_DECAY;

  // Clear canvas (transparent, photo shows through)
  ctx.clearRect(0, 0, W, H);

  // Celestial (moon)
  celestial.update(dt);

  // Fireflies
  fireflies.forEach(f => {
    // ── State machine ──
    f.stateTimer -= dt;
    if (f.stateTimer <= 0) {
      switch (f.state) {
        case 'off':
          f.state = 'rising'; f.stateTimer = 0.12;
          break;
        case 'rising':
          f.state = 'on'; f.stateTimer = f.flashDur;
          break;
        case 'on':
          f.state = 'falling'; f.stateTimer = 0.3;
          break;
        case 'falling':
          f.state = 'off';
          f.darkDur = rand(f.sp.flashOff[0], f.sp.flashOff[1]);
          f.flashDur = rand(f.sp.flashOn[0], f.sp.flashOn[1]);
          f.stateTimer = f.darkDur;
          break;
      }
    }

    // Brightness
    if (f.state === 'rising') {
      f.brightness = Math.min(1, f.brightness + dt / 0.12);
    } else if (f.state === 'on') {
      f.brightness = 0.8 + Math.sin(now * 0.015 + f.x) * 0.2;
    } else if (f.state === 'falling') {
      f.brightness = Math.max(0, f.brightness - dt / 0.3);
    } else {
      f.brightness *= 0.9;
    }

    // Movement (proximity wind)
    const fw = windAt(f.x, f.y);
    f.vx += smoothWindX * 0.06 * dt * fw + rand(-0.01, 0.01);
    f.vy += smoothWindY * 0.06 * dt * fw + rand(-0.01, 0.01);

    // Mouse repulsion
    const dx = f.x - mouseX;
    const dy = f.y - mouseY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < 120 && dist > 0) {
      f.vx += (dx / dist) * 0.1;
      f.vy += (dy / dist) * 0.1;
    }

    f.vx = clamp(f.vx, -1.2, 1.2);
    f.vy = clamp(f.vy, -1.2, 1.2);
    f.x += f.vx;
    f.y += f.vy;

    // Wrap
    if (f.x < -20) f.x = W + 20;
    if (f.x > W + 20) f.x = -20;
    if (f.y < -20) f.y = H + 20;
    if (f.y > H + 20) f.y = -20;

    // ── Draw ──
    const b = f.brightness;
    if (b > 0.02) {
      // Outer glow
      ctx.globalAlpha = b * 0.35;
      const g = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.glowR);
      g.addColorStop(0, f.sp.glow);
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.fillRect(f.x - f.glowR, f.y - f.glowR, f.glowR * 2, f.glowR * 2);

      // Core
      ctx.globalAlpha = b * 0.9;
      ctx.fillStyle = f.sp.core;
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.coreR, 0, Math.PI * 2);
      ctx.fill();

      // Bright center
      ctx.globalAlpha = b * 0.6;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.coreR * 0.4, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Tiny dim dot when off
      ctx.globalAlpha = 0.06;
      ctx.fillStyle = f.sp.core;
      ctx.beginPath();
      ctx.arc(f.x, f.y, 1, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  ctx.globalAlpha = 1;
}

buildFireflies();
animate();
</script>
</body></html>
