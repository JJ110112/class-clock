<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; }
  body { overflow:hidden; background:#050515; cursor:default; }
</style>
</head>
<body>
<script src="../js/celestial.js"></script>
<script src="../js/phaser.min.js"></script>
<script>
/* ═══════════════════════════════
   雪梨煙火 – Sydney Fireworks
   ═══════════════════════════════ */

let smoothWindX = 0, smoothWindY = 0;
const WIND_DECAY = 0.92, WIND_GAIN = 0.6;
let mousePos = { x: -999, y: -999 };
let mouseX = -999, mouseY = -999;
const WIND_RADIUS = 200;
function windAt(x, y) { const dx=x-mouseX, dy=y-mouseY, d=Math.sqrt(dx*dx+dy*dy); return d<WIND_RADIUS?1-d/WIND_RADIUS:0; }
const moon = new CelestialBody({ type: 'moon', radius: 14 });

const FW_TYPES = [
  { label: '牡丹花火', type: 'sphere' },
  { label: '柳樹花火', type: 'willow' },
  { label: '菊花花火', type: 'chrysanthemum' },
  { label: '雙環花火', type: 'double' },
  { label: '流星花火', type: 'comet' },
  { label: '隨機花火', type: 'random' },
];
let typeIdx = 5; // default random
let scene = null;

const FW_COLORS = [
  [0xff4488, 0xff88bb, 0xffaacc],
  [0x44ddff, 0x88eeff, 0xbbf4ff],
  [0xffdd44, 0xffee88, 0xfff4bb],
  [0x44ff88, 0x88ffbb, 0xbbffdd],
  [0xff8844, 0xffaa77, 0xffccaa],
  [0xaa44ff, 0xcc88ff, 0xddaaff],
  [0xffffff, 0xeeeeff, 0xddddff],
];

function onMouseMove(d) {
  mousePos.x = d.x; mousePos.y = d.y;
  mouseX = d.x; mouseY = d.y;
  smoothWindX += d.windVX * d.windStrength * WIND_GAIN;
  smoothWindY += d.windVY * d.windStrength * WIND_GAIN;
}

window.addEventListener('message', (e) => {
  if (e.data.type === 'mousemove') onMouseMove(e.data);
  if (e.data.type === 'time') { moon.setTime(e.data.hours, e.data.minutes); }
  if (e.data.type === 'density') {
    typeIdx = (typeIdx + e.data.dir + FW_TYPES.length) % FW_TYPES.length;
    parent.postMessage({ type: 'densityLabel', label: FW_TYPES[typeIdx].label }, '*');
  }
  if (e.data.type === 'click') {
    if (!moon.handleClick(e.data.x, e.data.y) && scene) scene.clickFirework(e.data.x, e.data.y);
  }
});

const W = window.innerWidth, H = window.innerHeight;

class SydneyScene extends Phaser.Scene {
  constructor() { super('sydney'); }

  create() {
    scene = this;

    // ── Night sky ──
    const bg = this.add.graphics().setDepth(-10);
    bg.fillGradientStyle(0x050520, 0x080828, 0x0a0a30, 0x050515, 1);
    bg.fillRect(0, 0, W, H);

    // ── Stars ──
    const starsG = this.add.graphics().setDepth(-8);
    for (let i = 0; i < 80; i++) {
      starsG.fillStyle(0xe8e8ff, Phaser.Math.FloatBetween(0.1, 0.4));
      starsG.fillCircle(Phaser.Math.Between(0, W), Phaser.Math.Between(0, H * 0.5), Phaser.Math.FloatBetween(0.4, 1.2));
    }

    // ── Water ──
    this.waterY = H * 0.68;
    const water = this.add.graphics().setDepth(1);
    water.fillGradientStyle(0x080828, 0x0a0a30, 0x050520, 0x040418, 0.9);
    water.fillRect(0, this.waterY, W, H * 0.32);

    // ── Sydney Harbour Bridge ──
    this.bridgeG = this.add.graphics().setDepth(3);
    this.bridgeLightsG = this.add.graphics().setDepth(3.5);
    this.bridgeLights = [];
    this.drawBridge();

    // ── Opera House ──
    this.drawOperaHouse();

    // ── City skyline ──
    this.drawSkyline();

    // ── Sailboats ──
    this.sailboats = [];
    this.sailboatG = this.add.graphics().setDepth(1.5);
    for (let i = 0; i < 6; i++) this.addSailboat();

    // ── Water reflections ──
    this.reflectG = this.add.graphics().setDepth(2);

    // ── Fireworks ──
    this.fireworks = [];    // active explosions
    this.trails = [];       // rising trails
  }

  addSailboat() {
    const dirX = Math.random() > 0.5 ? 1 : -1;
    const y = Phaser.Math.FloatBetween(this.waterY + 10, this.waterY + H * 0.24);
    // Some boats move vertically (approaching or receding)
    const hasVertical = Math.random() > 0.5;
    const dirY = hasVertical ? (Math.random() > 0.5 ? 1 : -1) : 0;
    this.sailboats.push({
      x: Phaser.Math.Between(50, W - 50),
      y, dirX, dirY,
      speedX: Phaser.Math.FloatBetween(0.08, 0.25),
      speedY: dirY !== 0 ? Phaser.Math.FloatBetween(0.02, 0.08) : 0,
      bobPhase: Phaser.Math.FloatBetween(0, Math.PI * 2),
      sailColor: Phaser.Utils.Array.GetRandom([0xddddee, 0xeeddcc, 0xccddee, 0xeeeedd]),
    });
  }

  getSailboatSize(y) {
    const depth = Phaser.Math.Clamp((y - this.waterY) / (H * 0.26), 0, 1);
    return {
      size: 0.6 + depth * 1.2,   // 0.6 (far) → 1.8 (near)
      speed: 0.06 + depth * 0.25,
      alpha: 0.2 + depth * 0.6,
      depth,
    };
  }

  drawBridge() {
    const g = this.bridgeG;
    const bx1 = W * 0.15, bx2 = W * 0.75;
    const by = this.waterY - 10;
    const archH = H * 0.18;

    // Road deck
    g.fillStyle(0x222233, 1);
    g.fillRect(bx1, by - 5, bx2 - bx1, 8);

    // Arch
    g.lineStyle(4, 0x333344, 1);
    g.beginPath();
    for (let t = 0; t <= 1; t += 0.02) {
      const x = bx1 + t * (bx2 - bx1);
      const y = by - Math.sin(t * Math.PI) * archH;
      if (t === 0) g.moveTo(x, y); else g.lineTo(x, y);
    }
    g.strokePath();

    // Vertical cables
    g.lineStyle(1, 0x333344, 0.6);
    for (let t = 0.05; t < 1; t += 0.05) {
      const x = bx1 + t * (bx2 - bx1);
      const archY = by - Math.sin(t * Math.PI) * archH;
      g.lineBetween(x, archY, x, by - 5);
    }

    // Pylons
    g.fillStyle(0x2a2a3a, 1);
    g.fillRect(bx1 - 8, by - archH * 0.3, 16, archH * 0.3 + 10);
    g.fillRect(bx2 - 8, by - archH * 0.3, 16, archH * 0.3 + 10);

    // Store light positions along arch
    this.bridgeLights = [];
    for (let t = 0.02; t < 1; t += 0.03) {
      const x = bx1 + t * (bx2 - bx1);
      const y = by - Math.sin(t * Math.PI) * archH;
      this.bridgeLights.push({ x, y, baseColor: 0x4488ff, phase: t * Math.PI * 4, brightness: 0, color: 0x4488ff });
    }
  }

  drawOperaHouse() {
    const g = this.add.graphics().setDepth(4);
    const ox = W * 0.82, oy = this.waterY - 5;
    // Sails
    const sails = [
      { dx: 0, h: 45, w: 25 },
      { dx: 18, h: 38, w: 22 },
      { dx: 33, h: 28, w: 18 },
      { dx: -12, h: 30, w: 20 },
    ];
    sails.forEach(s => {
      g.fillStyle(0xccccdd, 0.85);
      g.beginPath();
      g.moveTo(ox + s.dx, oy);
      g.lineTo(ox + s.dx + s.w * 0.2, oy - s.h);
      g.lineTo(ox + s.dx + s.w, oy);
      g.closePath();
      g.fillPath();
      // Highlight
      g.lineStyle(1, 0xddddee, 0.4);
      g.lineBetween(ox + s.dx + s.w * 0.2, oy - s.h, ox + s.dx + s.w * 0.15, oy);
    });
    // Base
    g.fillStyle(0x999aaa, 0.8);
    g.fillRect(ox - 15, oy, 65, 6);
  }

  drawSkyline() {
    const g = this.add.graphics().setDepth(2.5);
    // Background buildings
    for (let i = 0; i < 30; i++) {
      const bx = Phaser.Math.Between(0, W);
      const bw = Phaser.Math.Between(15, 40);
      const bh = Phaser.Math.Between(20, H * 0.15);
      g.fillStyle(Phaser.Display.Color.GetColor(12, 12, 20 + i % 5), 1);
      g.fillRect(bx, this.waterY - bh, bw, bh);
      // Some lit windows
      g.fillStyle(0xffcc66, Phaser.Math.FloatBetween(0.05, 0.15));
      for (let wy = this.waterY - bh + 4; wy < this.waterY - 4; wy += 8) {
        for (let wx = bx + 3; wx < bx + bw - 4; wx += 7) {
          if (Math.random() > 0.5) g.fillRect(wx, wy, 3, 4);
        }
      }
    }
  }

  updateBridgeLights(time, dt) {
    this.bridgeLightsG.clear();
    const g = this.bridgeLightsG;
    const neonColors = [0xff4488, 0x44ddff, 0xffdd44, 0x44ff88, 0xaa44ff];

    this.bridgeLights.forEach(l => {
      // Mouse proximity → light up
      const dx = mousePos.x - l.x;
      const dy = mousePos.y - l.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const mouseNear = Math.max(0, 1 - dist / 180);

      // Increase brightness when mouse near, decay when not
      if (mouseNear > 0.05) {
        l.brightness = Math.min(1, l.brightness + mouseNear * dt * 4);
        const idx = Math.floor((l.phase + time * 0.001) * 2) % neonColors.length;
        l.color = neonColors[idx];
      } else {
        l.brightness *= (1 - dt * 1.5); // gradual fade
        if (l.brightness < 0.01) l.brightness = 0;
      }

      const pulse = (Math.sin(time * 0.003 + l.phase) + 1) / 2;
      const baseAlpha = 0.08 + pulse * 0.08; // dim ambient pulse
      const alpha = baseAlpha + l.brightness * 0.7;
      const size = 1.5 + l.brightness * 3;

      // Glow
      if (l.brightness > 0.05) {
        g.fillStyle(l.color, l.brightness * 0.2);
        g.fillCircle(l.x, l.y, size + 6);
      }
      // Core
      g.fillStyle(l.brightness > 0.05 ? l.color : l.baseColor, alpha);
      g.fillCircle(l.x, l.y, size);
    });
  }

  clickFirework(cx, cy) {
    const colors = Phaser.Utils.Array.GetRandom(FW_COLORS);
    this.explode(cx, cy, colors);
  }

  explode(x, y, colors) {
    const fwType = FW_TYPES[typeIdx].type;
    const type = fwType === 'random'
      ? Phaser.Utils.Array.GetRandom(['sphere','willow','chrysanthemum','double','comet'])
      : fwType;
    const count = type === 'chrysanthemum' ? 120 : type === 'comet' ? 50 : Phaser.Math.Between(50, 90);
    const particles = [];

    for (let i = 0; i < count; i++) {
      const g = this.add.graphics().setDepth(10);
      const color = Phaser.Utils.Array.GetRandom(colors);
      const size = Phaser.Math.FloatBetween(1, 3);
      g.fillStyle(color, 1);
      g.fillCircle(0, 0, size);
      g.setPosition(x, y);

      let vx, vy, gravity = 0.02, maxLife = Phaser.Math.FloatBetween(0.8, 2.0);
      const angle = (i / count) * Math.PI * 2;

      if (type === 'sphere') {
        const a = angle + Phaser.Math.FloatBetween(-0.1, 0.1);
        const speed = Phaser.Math.FloatBetween(1.5, 4);
        vx = Math.cos(a) * speed;
        vy = Math.sin(a) * speed;
      } else if (type === 'willow') {
        const a = angle + Phaser.Math.FloatBetween(-0.2, 0.2);
        const speed = Phaser.Math.FloatBetween(0.8, 2.5);
        vx = Math.cos(a) * speed;
        vy = Math.sin(a) * speed;
        gravity = 0.04; // heavier droop
        maxLife = Phaser.Math.FloatBetween(1.5, 3.0);
      } else if (type === 'chrysanthemum') {
        const a = angle + Phaser.Math.FloatBetween(-0.05, 0.05);
        const speed = Phaser.Math.FloatBetween(2, 5.5);
        vx = Math.cos(a) * speed;
        vy = Math.sin(a) * speed;
        gravity = 0.008; // floaty
        maxLife = Phaser.Math.FloatBetween(1.2, 2.5);
      } else if (type === 'double') {
        const ring = i < count / 2 ? 0 : 1;
        const a = ((i % (count / 2)) / (count / 2)) * Math.PI * 2;
        const speed = ring === 0 ? Phaser.Math.FloatBetween(2, 3) : Phaser.Math.FloatBetween(3.5, 5);
        vx = Math.cos(a) * speed;
        vy = Math.sin(a) * speed;
      } else if (type === 'comet') {
        // Directional burst (upward fan)
        const a = -Math.PI / 2 + Phaser.Math.FloatBetween(-0.8, 0.8);
        const speed = Phaser.Math.FloatBetween(2, 6);
        vx = Math.cos(a) * speed + Phaser.Math.FloatBetween(-0.5, 0.5);
        vy = Math.sin(a) * speed;
        gravity = 0.03;
        maxLife = Phaser.Math.FloatBetween(1.0, 2.5);
      }

      particles.push({ g, vx, vy, life: 1, maxLife, gravity, size, color });
    }

    this.fireworks.push({ particles, x, y, age: 0 });

    // Flash
    const flash = this.add.circle(x, y, 20, Phaser.Utils.Array.GetRandom(colors), 0.9).setDepth(11);
    this.tweens.add({ targets: flash, radius: 50, alpha: 0, duration: 250, onComplete: () => flash.destroy() });
  }

  update(time, delta) {
    const dt = delta / 1000;
    smoothWindX *= WIND_DECAY;
    smoothWindY *= WIND_DECAY;
    moon.update(dt);

    // Sailboats (draw far→near for correct overlap)
    this.sailboatG.clear();
    const waterTop = this.waterY + 8;
    const waterBot = this.waterY + H * 0.26;
    this.sailboats.sort((a, b) => a.y - b.y);
    this.sailboats.forEach(b => {
      const info = this.getSailboatSize(b.y);
      const s = info.size;

      b.x += b.dirX * (b.speedX + info.speed) * 0.5 + smoothWindX * 2 * dt * windAt(b.x, b.y);
      b.y += b.dirY * b.speedY;
      b.bobPhase += 0.02;
      const bob = Math.sin(b.bobPhase) * 2 * s;
      const bx = b.x, by = b.y + bob;
      const g = this.sailboatG;

      // Hull
      g.fillStyle(0x222233, 0.7 + info.depth * 0.3);
      g.beginPath();
      g.moveTo(bx - 14 * s, by);
      g.lineTo(bx - 10 * s, by + 6 * s);
      g.lineTo(bx + 10 * s, by + 6 * s);
      g.lineTo(bx + 14 * s, by);
      g.closePath();
      g.fillPath();
      // Hull stripe
      g.fillStyle(0x334455, 0.4 * info.depth);
      g.fillRect(bx - 10 * s, by + 1, 20 * s, 2 * s);

      // Mast
      g.lineStyle(1.5 * s, 0x444466, 0.7);
      g.lineBetween(bx, by, bx, by - 22 * s);

      // Main sail
      g.fillStyle(b.sailColor, 0.4 + info.depth * 0.4);
      g.beginPath();
      g.moveTo(bx, by - 20 * s);
      g.lineTo(bx + 12 * s * b.dirX, by - 8 * s);
      g.lineTo(bx, by - 2 * s);
      g.closePath();
      g.fillPath();

      // Jib (small front sail)
      g.fillStyle(b.sailColor, 0.3 + info.depth * 0.3);
      g.beginPath();
      g.moveTo(bx, by - 18 * s);
      g.lineTo(bx + 7 * s * b.dirX, by - 10 * s);
      g.lineTo(bx, by - 4 * s);
      g.closePath();
      g.fillPath();

      // Light
      g.fillStyle(0xffcc66, info.alpha * 0.6);
      g.fillCircle(bx, by - 1, 2 * s);
      // Light reflection on water
      g.fillStyle(0xffcc66, info.alpha * 0.15);
      g.fillEllipse(bx, by + 8 * s, 4 * s, 2 * s);

      // Wrap horizontal
      if (b.dirX > 0 && b.x > W + 40 * s) b.x = -40 * s;
      if (b.dirX < 0 && b.x < -40 * s) b.x = W + 40 * s;

      // Vertical bounce: reverse at water edges, respawn if needed
      if (b.y < waterTop) { b.dirY = Math.abs(b.dirY) || 0.04; }
      if (b.y > waterBot) { b.dirY = -Math.abs(b.dirY) || -0.04; }
    });

    // Bridge lights
    this.updateBridgeLights(time, dt);

    // (No trails - fireworks explode directly at click)
    // Legacy trail cleanup
    this.trails = this.trails.filter(t => {
      const dx = t.tx - t.x;
      const dy = t.ty - t.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 10) {
        t.g.destroy();
        this.explode(t.tx, t.ty, t.colors);
        return false;
      }
      const norm = dist || 1;
      t.x += (dx / norm) * t.speed;
      t.y += (dy / norm) * t.speed;
      t.g.clear();
      // Trail spark
      t.g.fillStyle(0xffeeaa, 0.9);
      t.g.fillCircle(t.x, t.y, 2);
      // Tail
      t.g.lineStyle(1, 0xffcc66, 0.4);
      t.g.lineBetween(t.x, t.y, t.x - (dx / norm) * 15, t.y - (dy / norm) * 15);
      return true;
    });

    // Firework particles
    this.fireworks = this.fireworks.filter(fw => {
      fw.age += dt;
      let alive = false;
      fw.particles = fw.particles.filter(p => {
        p.life -= dt / p.maxLife;
        if (p.life <= 0) { p.g.destroy(); return false; }
        alive = true;
        p.vy += p.gravity;
        p.vx += smoothWindX * 0.005 * windAt(p.g.x, p.g.y);
        p.g.x += p.vx;
        p.g.y += p.vy;
        p.g.alpha = Math.max(0, p.life);
        p.g.scaleX = p.life;
        p.g.scaleY = p.life;
        return true;
      });
      return alive;
    });

    // Water reflections
    this.reflectG.clear();
    this.fireworks.forEach(fw => {
      fw.particles.forEach(p => {
        if (p.life > 0.3) {
          const ry = this.waterY + (p.g.y - this.waterY) * -0.3 + Phaser.Math.Between(0, 5);
          if (ry > this.waterY) {
            this.reflectG.fillStyle(p.color || 0xffffff, p.life * 0.15);
            this.reflectG.fillCircle(p.g.x, ry, 1.5);
          }
        }
      });
    });
  }
}

new Phaser.Game({
  type: Phaser.AUTO, width: W, height: H, transparent: true,
  scene: SydneyScene, banner: false,
  scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH },
});
</script>
</body></html>
