<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; }
  body { overflow:hidden; background: linear-gradient(180deg, #c8ddf0 0%, #dfe9f3 30%, #e8f0f8 100%); cursor:default; }
</style>
</head>
<body>
<script src="../js/celestial.js"></script>
<script src="../js/phaser.min.js"></script>
<script>
/* ═══════════════════════════════
   冬雪 – Winter Snow (daytime + sun)
   ═══════════════════════════════ */

let smoothWindX = 0, smoothWindY = 0;
const WIND_DECAY = 0.93, WIND_GAIN = 1.5;
let mouseX = -999, mouseY = -999;
const WIND_RADIUS = 200;
function windAt(x, y) { const dx=x-mouseX, dy=y-mouseY, d=Math.sqrt(dx*dx+dy*dy); return d<WIND_RADIUS?1-d/WIND_RADIUS:0; }
const DENSITIES = [
  { label: '小雪',   count: 40 },
  { label: '中雪',   count: 90 },
  { label: '大雪',   count: 200 },
];
let densityIdx = 1;
let scene = null;
const sun = new CelestialBody({ type: 'sun', radius: 28 });

function onMouseMove(d) {
  mouseX = d.x; mouseY = d.y;
  smoothWindX += d.windVX * d.windStrength * WIND_GAIN;
  smoothWindY += d.windVY * d.windStrength * WIND_GAIN;
}

window.addEventListener('message', (e) => {
  if (e.data.type === 'mousemove') onMouseMove(e.data);
  if (e.data.type === 'time') { sun.setTime(e.data.hours, e.data.minutes); }
  if (e.data.type === 'density') {
    densityIdx = (densityIdx + e.data.dir + DENSITIES.length) % DENSITIES.length;
    if (scene) scene.rebuildSnow();
    parent.postMessage({ type: 'densityLabel', label: DENSITIES[densityIdx].label }, '*');
  }
  if (e.data.type === 'click') {
    if (!sun.handleClick(e.data.x, e.data.y) && scene) scene.spawnHexFlakes(e.data.x, e.data.y);
  }
});

const W = window.innerWidth, H = window.innerHeight;

class WinterScene extends Phaser.Scene {
  constructor() { super('winter'); }

  create() {
    scene = this;
    const bg = this.add.graphics();
    bg.fillGradientStyle(0xc8ddf0, 0xd4e4f2, 0xdfe9f3, 0xe8f0f8, 1);
    bg.fillRect(0, 0, W, H).setDepth(-10);

    // Ground snow
    const ground = this.add.graphics();
    ground.fillGradientStyle(0xf0f4f8, 0xeef2f6, 0xffffff, 0xffffff, 1);
    ground.fillRect(0, H * 0.88, W, H * 0.12).setDepth(0);

    this.snowflakes = [];
    this.rebuildSnow();

    // Click-spawned hex snowflakes
    this.hexFlakes = [];

    // Snow accumulation
    this.piledG = this.add.graphics().setDepth(0.5);
    this.piled = [];
  }

  rebuildSnow() {
    this.snowflakes.forEach(s => s.g.destroy());
    this.snowflakes = [];
    const count = DENSITIES[densityIdx].count;
    for (let i = 0; i < count; i++) this.snowflakes.push(this.createSnow(true));
  }

  createSnow(init) {
    const x = Phaser.Math.Between(0, W);
    const y = init ? Phaser.Math.Between(0, H) : Phaser.Math.Between(-30, -2);
    const r = Phaser.Math.FloatBetween(1.5, 4.5);
    const g = this.add.graphics();
    g.fillStyle(0xffffff, Phaser.Math.FloatBetween(0.5, 0.9));
    g.fillCircle(0, 0, r);
    g.fillStyle(0xd0e4ff, 0.15);
    g.fillCircle(0, 0, r * 2.5);
    g.setPosition(x, y).setDepth(2);
    return {
      g, r,
      speed: Phaser.Math.FloatBetween(0.3, 1.0),
      swingPhase: Phaser.Math.FloatBetween(0, Math.PI * 2),
      swingSpeed: Phaser.Math.FloatBetween(0.003, 0.012),
      swingAmp: Phaser.Math.FloatBetween(0.3, 1.8),
    };
  }

  spawnHexFlakes(cx, cy) {
    const count = 10 + Math.floor(Math.random() * 8);
    for (let i = 0; i < count; i++) {
      const size = Phaser.Math.FloatBetween(6, 16);
      const g = this.add.graphics().setDepth(8);
      const color = Phaser.Utils.Array.GetRandom([0xffffff, 0xd0e8ff, 0xb8d4f0, 0xe8f4ff]);
      g.lineStyle(1.2, color, Phaser.Math.FloatBetween(0.6, 1.0));
      // Draw hexagonal snowflake: 6 branches with sub-branches
      for (let b = 0; b < 6; b++) {
        const angle = (b / 6) * Math.PI * 2;
        const ex = Math.cos(angle) * size;
        const ey = Math.sin(angle) * size;
        g.lineBetween(0, 0, ex, ey);
        // Sub-branches at 60% length
        const mx = ex * 0.6, my = ey * 0.6;
        const subLen = size * 0.35;
        const a1 = angle + 0.5, a2 = angle - 0.5;
        g.lineBetween(mx, my, mx + Math.cos(a1) * subLen, my + Math.sin(a1) * subLen);
        g.lineBetween(mx, my, mx + Math.cos(a2) * subLen, my + Math.sin(a2) * subLen);
      }
      g.setPosition(cx, cy);

      const angle = Phaser.Math.FloatBetween(0, Math.PI * 2);
      const speed = Phaser.Math.FloatBetween(40, 150);
      const maxLife = Phaser.Math.FloatBetween(2.0, 4.0);
      this.hexFlakes.push({
        g,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 30,
        rotSpeed: Phaser.Math.FloatBetween(-0.06, 0.06),
        life: maxLife, maxLife,
      });
    }
  }

  update(time, delta) {
    const dt = delta / 1000;
    smoothWindX *= WIND_DECAY;
    smoothWindY *= WIND_DECAY;
    sun.update(dt);

    const groundY = H * 0.88;
    this.snowflakes.forEach(s => {
      s.swingPhase += s.swingSpeed;
      const sw = windAt(s.g.x, s.g.y);
      s.g.x += Math.sin(s.swingPhase) * s.swingAmp + smoothWindX * 35 * dt * sw;
      s.g.y += s.speed + smoothWindY * 10 * dt * sw;
      if (s.g.y > groundY) {
        if (this.piled.length < 150) {
          this.piled.push({
            x: s.g.x, y: groundY - Phaser.Math.FloatBetween(0, 6),
            r: s.r * Phaser.Math.FloatBetween(0.8, 1.2),
            alpha: 0.7, age: 0,
          });
        }
        s.g.x = Phaser.Math.Between(0, W); s.g.y = Phaser.Math.Between(-30, -2);
      }
      if (s.g.x < -30 || s.g.x > W + 30) {
        s.g.x = Phaser.Math.Between(0, W); s.g.y = Phaser.Math.Between(-30, -2);
      }
    });

    // Snow accumulation
    this.piledG.clear();
    this.piled = this.piled.filter(p => {
      p.age += dt;
      if (p.age > 6) p.alpha -= dt * 0.2;
      if (p.alpha <= 0) return false;
      this.piledG.fillStyle(0xffffff, p.alpha * 0.6);
      this.piledG.fillCircle(p.x, p.y, p.r * 1.5);
      this.piledG.fillStyle(0xe8f0ff, p.alpha * 0.25);
      this.piledG.fillCircle(p.x, p.y, p.r * 3);
      return true;
    });

    // Update hex snowflakes from click
    this.hexFlakes = this.hexFlakes.filter(f => {
      f.life -= dt;
      if (f.life <= 0) { f.g.destroy(); return false; }
      f.g.x += (f.vx + smoothWindX * 20 * windAt(f.g.x, f.g.y)) * dt;
      f.g.y += (f.vy + 30) * dt;
      f.vy += 15 * dt; // gentle gravity
      f.g.rotation += f.rotSpeed;
      f.g.alpha = Math.min(1, f.life / f.maxLife * 1.5);
      return true;
    });

  }
}

new Phaser.Game({
  type: Phaser.AUTO, width: W, height: H, transparent: true,
  scene: WinterScene, banner: false,
  scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH },
});
</script>
</body></html>
